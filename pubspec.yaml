name: sabil_life
description: "Sabil Life — family-life directory app (frontend / mock data build)."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any
  flutter_riverpod: ^2.5.0
  go_router: ^14.0.0
  flutter_map: ^7.0.0
  latlong2: ^0.9.0
  cached_network_image: ^3.3.0
  google_fonts: ^6.2.0
  shared_preferences: ^2.2.0
  dio: ^5.4.0
  flutter_dotenv: ^5.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  generate: true
  assets:
    - .env
