name: sabil_life
description: "Sabil Life — family-life directory app (frontend / mock data build)."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any
  flutter_riverpod: ^2.5.0
  go_router: ^14.0.0
  flutter_map: ^7.0.0
  latlong2: ^0.9.0
  cached_network_image: ^3.3.0
  google_fonts: ^6.2.0
  shared_preferences: ^2.2.0
  dio: ^5.4.0
  image_picker: ^1.1.0
  firebase_core: ^4.11.0
  firebase_messaging: ^16.4.1
  flutter_local_notifications: ^22.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/placeholder_1200x800.png
